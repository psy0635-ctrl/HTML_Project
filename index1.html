<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Fit-Algorithm</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background-color: #f5f6fa;
      color: #333;
    }

    /* Header */
    header {
      background: #111;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 20px;
      letter-spacing: 1px;
    }

    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      opacity: 0.7;
    }

    /* Main */
    .container {
      padding: 40px;
    }

    .title {
      margin-bottom: 30px;
    }

    .title h2 {
      font-size: 28px;
    }

    .title p {
      color: #777;
      margin-top: 5px;
    }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 15px;
    }

    .data {
      font-size: 14px;
      line-height: 1.6;
    }

    .highlight {
      font-weight: bold;
      color: #111;
    }

    /* Footer */
    footer {
      margin-top: 60px;
      padding: 20px;
      text-align: center;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Fit-Algorithm</h1>
    <nav>
      <a href="#">Dashboard</a>
      <a href="comparison.html">Compare</a>
      <a href="guide.html">Guide</a>
    </nav>
  </header>

  <!-- Main -->
  <div class="container">

    <div class="title">
      <h2>Dashboard</h2>
      <p>나의 기준 사이즈 데이터를 확인하세요</p>
    </div>

    <div class="card-grid">

      <!-- Top Card -->
      <div class="card">
        <h3>상의 기준 사이즈</h3>
        <div class="data">
          어깨: <span class="highlight">42 cm</span><br>
          가슴: <span class="highlight">98 cm</span><br>
          기장: <span class="highlight">68 cm</span>
        </div>
      </div>

      <!-- Bottom Card -->
      <div class="card">
        <h3>하의 기준 사이즈</h3>
        <div class="data">
          허리: <span class="highlight">32 inch</span><br>
          밑위: <span class="highlight">26 cm</span><br>
          총장: <span class="highlight">96 cm</span>
        </div>
      </div>

      <!-- Insight Card -->
      <div class="card">
        <h3>핏 분석</h3>
        <div class="data">
          ✔ 평균 체형 기준<br>
          ✔ 슬림핏 선호<br>
          ✔ 상의 길이 중요
        </div>
      </div>

      <!-- CTA Card -->
      <div class="card">
        <h3>비교 시작</h3>
        <div class="data">
          새로운 옷과 사이즈를 비교해보세요<br><br>
          <a href="comparison.html" style="color:#111; font-weight:bold;">
            → Compare Now
          </a>
        </div>
      </div>

    </div>

  </div>

  <!-- Footer -->
  <footer>
    © 2026 Fit-Algorithm | Designed by YOU
  </footer>

</body>
</html>
