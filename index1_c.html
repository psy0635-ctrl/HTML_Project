<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Fit-Algorithm | Compare</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f6fa;
      color: #333;
    }

    header {
      background: #111;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
    }

    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
    }

    .container {
      display: flex;
      gap: 30px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .box {
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      flex: 1;
      min-width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    .positive { color: red; }
    .negative { color: blue; }

    .advice {
      margin-top: 15px;
      line-height: 1.6;
    }

    svg {
      margin-top: 20px;
      width: 100%;
      height: 200px;
    }

    /* 카드 등장 애니메이션 */
.box {
  animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 버튼 클릭 효과 */
button:active {
  transform: scale(0.97);
}

/* 결과 강조 애니메이션 */
.highlight-anim {
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* SVG 부드러운 변화 */
#new {
  transition: all 0.5s ease;
}

/* 색상 변화 애니메이션 */
.flash {
  animation: flash 0.5s;
}

@keyframes flash {
  0% { background-color: #fff; }
  50% { background-color: #ffeaa7; }
  100% { background-color: #fff; }
}



  </style>
</head>

<body>

<header>
  <h1>Fit-Algorithm</h1>
  <nav>
    <a href="index1.html">Dashboard</a>
    <a href="#">Compare</a>
    <a href="guide.html">Guide</a>
  </nav>
</header>

<div class="container">

  <!-- 입력 -->
  <div class="box">
    <h2>사이즈 입력</h2>

    <input type="number" id="shoulder" placeholder="어깨 (cm)">
    <input type="number" id="chest" placeholder="가슴 (cm)">
    <input type="number" id="length" placeholder="기장 (cm)">

    <button onclick="compare()">비교하기</button>
  </div>

  <!-- 결과 -->
  <div class="box">
    <h2>비교 결과</h2>

    <table>
      <tr><td>어깨</td><td id="r_shoulder"></td></tr>
      <tr><td>가슴</td><td id="r_chest"></td></tr>
      <tr><td>기장</td><td id="r_length"></td></tr>
    </table>

    <div class="advice" id="advice"></div>

    <!-- SVG -->
    <svg>
      <!-- 기준 -->
      <rect id="base" x="50" y="20" width="100" height="140" fill="#ccc"></rect>
      <!-- 비교 -->
      <rect id="new" x="70" y="20" width="100" height="140" fill="rgba(0,0,0,0.3)"></rect>
    </svg>

  </div>

</div>

<script>
 function showResult(id, value) {
  const el = document.getElementById(id);

  el.textContent = value > 0 ? `+${value}cm` : `${value}cm`;
  el.className = value > 0 ? "positive highlight-anim" : "negative highlight-anim";

  // 애니메이션 리셋 (다시 실행되게)
  el.classList.remove("highlight-anim");
  void el.offsetWidth;
  el.classList.add("highlight-anim");
}
function compare() {
  const s = parseFloat(document.getElementById('shoulder').value);
  const c = parseFloat(document.getElementById('chest').value);
  const l = parseFloat(document.getElementById('length').value);

  if (!s || !c || !l) {
    alert("모든 값을 입력하세요");
    return;
  }

  // 카드 깜빡 효과
  document.querySelectorAll('.box').forEach(box => {
    box.classList.add('flash');
    setTimeout(() => box.classList.remove('flash'), 500);
  });

  const ds = s - base.shoulder;
  const dc = c - base.chest;
  const dl = l - base.length;

  showResult("r_shoulder", ds);
  showResult("r_chest", dc);
  showResult("r_length", dl);

  generateAdvice(ds, dc, dl);
  updateSVG(s, c, l);
}
function updateSVG(s, c, l) {
  const newRect = document.getElementById("new");

  // 애니메이션 초기 상태
  newRect.style.transform = "scale(0.8)";
  newRect.style.opacity = "0.5";

  setTimeout(() => {
    newRect.setAttribute("width", c);
    newRect.setAttribute("height", l * 2);

    newRect.style.transform = "scale(1)";
    newRect.style.opacity = "1";
  }, 100);
}

  
</script>

</body>
</html>
